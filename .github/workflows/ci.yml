name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel outdated runs when a new push arrives on the same ref
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-darwin
            runner: macos-latest
    # Map the optional S3-cache secrets to env so step-level `if` can test them.
    # (The `secrets` context is not permitted in `if` conditionals; `env` is.)
    env:
      NIX_CACHE_SIGNING_KEY: ${{ secrets.NIX_CACHE_SIGNING_KEY }}
      NIX_CACHE_AWS_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_AWS_ACCESS_KEY_ID }}
      NIX_CACHE_AWS_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_AWS_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v22
        with:
          extra-conf: |
            accept-flake-config = true

      - name: Restore Nix store cache
        uses: nix-community/cache-nix-action/restore@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-

      - name: Populate Nix store with dependencies
        run: nix develop --command true

      - name: Save Nix store cache
        uses: nix-community/cache-nix-action/save@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          gc-max-store-size-linux: 5G
          gc-max-store-size-macos: 5G
          purge: true
          purge-created: 604800

      - name: Build
        run: nix build --print-build-logs

      - name: Run tests with coverage
        run: nix develop --command cabal test --enable-coverage

      - name: Generate coverage report
        if: always()
        run: |
          nix develop --command bash -c '
          # The .tix file is named after the cabal test-suite (`tests`).
          TIX=$(find dist-newstyle -name "tests.tix" 2>/dev/null | head -1)
          if [ -z "$TIX" ]; then
            echo "No .tix file found — coverage report skipped."
            exit 0
          fi

          # Collect all mix directories
          MIXDIRS=$(find dist-newstyle -path "*/hpc/vanilla/mix" -type d 2>/dev/null)
          HPCDIR_ARGS=""
          for d in $MIXDIRS; do
            HPCDIR_ARGS="$HPCDIR_ARGS --hpcdir=$d"
          done

          # Generate text report (library modules only, exclude test harness)
          echo "=== HPC Coverage Report ==="
          REPORT=$(hpc report "$TIX" $HPCDIR_ARGS \
            --exclude=Main \
            --exclude=Paths_seal_harness \
            2>&1)
          echo "$REPORT"
          echo "$REPORT" > coverage-report.txt

          # Per-module breakdown
          echo ""
          echo "=== Per-Module Coverage ==="
          MODULE_REPORT=$(hpc report "$TIX" $HPCDIR_ARGS \
            --exclude=Main \
            --exclude=Paths_seal_harness \
            --per-module \
            2>&1)
          echo "$MODULE_REPORT"
          echo "$MODULE_REPORT" > coverage-per-module.txt
          '

      - name: Post coverage to job summary
        if: always()
        run: |
          if [ ! -f coverage-report.txt ]; then
            echo "No coverage report found." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "## Code Coverage (HPC)"
            echo ""
            echo '```'
            cat coverage-report.txt
            echo '```'
            echo ""
            echo "<details>"
            echo "<summary>Per-module breakdown</summary>"
            echo ""
            echo '```'
            cat coverage-per-module.txt
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      # ─────────────────────────────────────────────────────────────────────
      # Optional: push built store paths to the S3 Nix binary cache.
      # Runs on pushes to main AND on same-repo PR branches, so PR builds also
      # warm the cache. The `env.NIX_CACHE_* != ''` guard is what excludes fork
      # PRs: GitHub withholds secrets from forks, so these are empty there and
      # the step is skipped. Also skipped when the secrets aren't configured.
      # ─────────────────────────────────────────────────────────────────────
      - name: Push to S3 Nix cache
        # if: env.NIX_CACHE_SIGNING_KEY != '' && env.NIX_CACHE_AWS_ACCESS_KEY_ID != ''
        # `nix copy --to s3://…` authenticates via the AWS SDK, which reads the
        # standard AWS_* env vars. The job-level NIX_CACHE_AWS_* vars exist only
        # so the `if` above can gate on them (secrets aren't allowed in `if`), so
        # re-export them here under the names the SDK actually looks for.
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_AWS_SECRET_ACCESS_KEY }}
        run: |
          # Region must match the substituter URL in flake.nix.
          S3_CACHE='s3://${{ vars.NIX_CACHE_BUCKET }}'
          KEY=/tmp/nix-cache-priv-key.pem
          echo "$NIX_CACHE_SIGNING_KEY" > "$KEY"

          echo "Collecting store paths..."
          RESULT_PATHS=""
          if [ -e ./result ]; then
            RESULT_PATHS=$(nix-store -qR ./result)
          else
            echo "No ./result found, pushing dev shell only."
          fi

          DEVSHELL_OUT=$(nix build .#devShells.${{ matrix.system }}.default --print-out-paths --no-link 2>/dev/null || true)
          DEVSHELL_PATHS=""
          if [ -n "$DEVSHELL_OUT" ]; then
            DEVSHELL_PATHS=$(nix-store -qR $DEVSHELL_OUT)
          fi

          ALL_PATHS=$(echo -e "${RESULT_PATHS}\n${DEVSHELL_PATHS}" | sort -u | grep -v '^$')
          if [ -z "$ALL_PATHS" ]; then
            echo "No store paths to push."
            exit 0
          fi

          TOTAL=$(echo "$ALL_PATHS" | wc -l)
          echo "Signing and pushing $TOTAL store paths..."
          echo "$ALL_PATHS" | xargs nix store sign --key-file "$KEY"
          echo "$ALL_PATHS" | xargs nix copy --to "$S3_CACHE"
          echo "Cache push complete: $TOTAL paths."
